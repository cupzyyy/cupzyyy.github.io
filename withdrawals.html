<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin AREACUAN - Withdrawals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding-bottom: 70px; }
        .glass-card { background: rgba(30,41,59,0.8); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 20px 20px; display: flex; justify-content: space-around;
            max-width: 512px; margin: 0 auto; width: 100%; z-index: 50;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: #94A3B8; cursor: pointer; }
        .nav-item.active { color: #3B82F6; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .tab {
            padding: 8px 16px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.05);
        }
        .tab.active {
            background: #3B82F6;
            color: white;
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: bold;
        }
        .status-pending { background: #F59E0B; color: #000; }
        .status-processing { background: #3B82F6; color: white; }
        .status-success { background: #10B981; color: white; }
        .status-rejected { background: #EF4444; color: white; }
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 100px; z-index: 1000;
        }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="max-w-lg mx-auto px-4 pt-6 pb-20">
        <h1 class="text-2xl font-bold text-white mb-4">💰 Manage Withdrawals</h1>
        
        <!-- Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <div class="tab active" data-status="pending" onclick="filterWithdraws('pending')">⏳ Pending</div>
            <div class="tab" data-status="processing" onclick="filterWithdraws('processing')">⚙️ Processing</div>
            <div class="tab" data-status="success" onclick="filterWithdraws('success')">✅ Success</div>
            <div class="tab" data-status="rejected" onclick="filterWithdraws('rejected')">❌ Rejected</div>
        </div>

        <!-- Stats Summary -->
        <div class="glass-card p-4 mb-4">
            <div class="flex justify-between text-sm">
                <div class="text-center flex-1">
                    <div class="text-gray-400">Pending</div>
                    <div class="text-xl font-bold text-yellow-400" id="pendingCount">0</div>
                </div>
                <div class="text-center flex-1">
                    <div class="text-gray-400">Today</div>
                    <div class="text-xl font-bold text-blue-400" id="todayCount">0</div>
                </div>
                <div class="text-center flex-1">
                    <div class="text-gray-400">Total WD</div>
                    <div class="text-xl font-bold text-green-400" id="totalWdAmount">Rp0</div>
                </div>
            </div>
        </div>

        <!-- Withdrawals List -->
        <div class="glass-card p-4">
            <div id="withdrawalsList" class="space-y-3 max-h-[500px] overflow-y-auto">
                <div class="text-center text-gray-500 py-8">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg><span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='users.html'">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Users</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='withdrawals.html'">
            <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><path d="M1 10h6a2 2 0 0 1 2 2 2 2 0 0 1-2 2H1"/></svg><span>Withdrawals</span>
        </div>
        <div class="nav-item" onclick="window.location.href='settings.html'">
            <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg><span>Settings</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCf230zCliSZ9EYLByMnmflqw8sOz328Uc",
            authDomain: "database-cupz.firebaseapp.com",
            projectId: "database-cupz",
            storageBucket: "database-cupz.firebasestorage.app",
            messagingSenderId: "343357519412",
            appId: "1:343357519412:web:dce862636c7c459e6a3c61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let currentFilter = 'pending';
        let allWithdrawals = [];
        let usersCache = {};
        
        function showToast(msg, isError = false) {
            let old = document.querySelector('.toast');
            if(old) old.remove();
            let div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            div.style.background = isError ? 'rgba(239,68,68,0.9)' : 'rgba(34,197,94,0.9)';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        async function updateStatus(withdrawId, newStatus, trxId = null) {
            let updateData = { 
                status: newStatus,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(trxId) updateData.trxId = trxId;
            
            await db.collection('withdrawals').doc(withdrawId).update(updateData);
            
            // Kalo ditolak, balikin saldo
            if(newStatus === 'rejected') {
                let wdDoc = await db.collection('withdrawals').doc(withdrawId).get();
                let wdData = wdDoc.data();
                await db.collection('users').doc(wdData.userId).update({
                    balance: firebase.firestore.FieldValue.increment(wdData.amount)
                });
            }
            
            showToast(`✅ Status updated to ${newStatus}`);
        }
        
        function showDetailModal(wd) {
            let modalHtml = `
                <div class="modal" id="detailModal">
                    <div class="bg-gray-800 rounded-2xl p-6 w-96 max-w-full mx-4">
                        <h3 class="text-white font-bold mb-4">Detail Withdrawal</h3>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-gray-400">ID:</span><span class="font-mono">${wd.id}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">User:</span><span>${usersCache[wd.userId] || wd.userId}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">E-Wallet:</span><span class="capitalize">${wd.ewallet}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Nomor:</span><span>${wd.accountNumber}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Amount:</span><span class="font-mono text-green-400">Rp${wd.amount?.toLocaleString('id')}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Fee:</span><span class="font-mono">Rp${(wd.fee || 0).toLocaleString('id')}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">TRX ID:</span><span class="font-mono text-xs">${wd.trxId || '-'}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Created:</span><span>${wd.createdAt?.toDate().toLocaleString('id') || '-'}</span></div>
                        </div>
                        <button onclick="closeModal()" class="w-full mt-4 bg-gray-600 py-2 rounded-lg">Tutup</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function closeModal() {
            let modal = document.getElementById('detailModal');
            if(modal) modal.remove();
        }
        
        function filterWithdraws(status) {
            currentFilter = status;
            document.querySelectorAll('.tab').forEach(tab => {
                if(tab.dataset.status === status) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            renderWithdrawals();
        }
        
        async function renderWithdrawals() {
            let filtered = allWithdrawals.filter(w => w.status === currentFilter);
            
            if(filtered.length === 0) {
                document.getElementById('withdrawalsList').innerHTML = '<div class="text-center text-gray-500 py-8">No withdrawals found</div>';
                return;
            }
            
            let html = '';
            for(let wd of filtered) {
                let userEmail = usersCache[wd.userId] || 'Loading...';
                if(userEmail === 'Loading...') {
                    let userDoc = await db.collection('users').doc(wd.userId).get();
                    if(userDoc.exists) {
                        userEmail = userDoc.data().email;
                        usersCache[wd.userId] = userEmail;
                    }
                }
                
                let statusClass = `status-${wd.status}`;
                let date = wd.createdAt?.toDate().toLocaleString('id') || 'Baru';
                
                html += `
                    <div class="bg-gray-800 rounded-xl p-3">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="font-bold text-white text-sm">${userEmail}</div>
                                <div class="text-xs text-gray-400 capitalize">${wd.ewallet} - ${wd.accountNumber}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-mono text-green-400 font-bold">Rp${wd.amount?.toLocaleString('id')}</div>
                                <div class="text-xs text-gray-500">${date}</div>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="status-badge ${statusClass}">${wd.status}</span>
                            <div class="flex gap-2">
                                <button onclick="showDetailModal(${JSON.stringify(wd).replace(/"/g, '&quot;')})" class="bg-gray-700 px-2 py-1 rounded text-xs">📋 Detail</button>
                `;
                
                if(wd.status === 'pending') {
                    html += `
                        <button onclick="updateStatus('${wd.id}','processing')" class="bg-blue-600 px-2 py-1 rounded text-xs">⚙️ Process</button>
                        <button onclick="updateStatus('${wd.id}','rejected')" class="bg-red-600 px-2 py-1 rounded text-xs">❌ Reject</button>
                    `;
                } else if(wd.status === 'processing') {
                    html += `
                        <button onclick="updateStatus('${wd.id}','success')" class="bg-green-600 px-2 py-1 rounded text-xs">✅ Approve</button>
                        <button onclick="updateStatus('${wd.id}','rejected')" class="bg-red-600 px-2 py-1 rounded text-xs">❌ Reject</button>
                    `;
                }
                
                html += `</div></div></div>`;
            }
            document.getElementById('withdrawalsList').innerHTML = html;
        }
        
        // Real-time stats
        function updateStats() {
            let pending = allWithdrawals.filter(w => w.status === 'pending').length;
            document.getElementById('pendingCount').innerText = pending;
            
            let today = new Date();
            today.setHours(0,0,0,0);
            let todayWd = allWithdrawals.filter(w => {
                let wdDate = w.createdAt?.toDate();
                return wdDate && wdDate >= today;
            });
            document.getElementById('todayCount').innerText = todayWd.length;
            
            let totalAmount = allWithdrawals.filter(w => w.status === 'success').reduce((sum, w) => sum + (w.amount || 0), 0);
            document.getElementById('totalWdAmount').innerHTML = `Rp${totalAmount.toLocaleString('id')}`;
        }
        
        // Load users cache
        async function loadUsersCache() {
            let snap = await db.collection('users').get();
            snap.forEach(doc => {
                usersCache[doc.id] = doc.data().email;
            });
        }
        
        // Real-time withdrawals
        loadUsersCache();
        db.collection('withdrawals').orderBy('createdAt', 'desc').onSnapshot((snap) => {
            allWithdrawals = [];
            snap.forEach(doc => {
                allWithdrawals.push({ id: doc.id, ...doc.data() });
            });
            updateStats();
            renderWithdrawals();
        });
    </script>
</body>
</html>
