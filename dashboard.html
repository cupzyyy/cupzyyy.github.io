<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AREACUAN Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding-bottom: 70px; }
        .glass-card { background: rgba(30,41,59,0.8); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2)); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px 20px; display: flex; justify-content: space-around;
            max-width: 512px; margin: 0 auto; width: 100%; z-index: 50;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: #94A3B8; cursor: pointer; }
        .nav-item.active { color: #3B82F6; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); color: white;
            padding: 12px 20px; border-radius: 100px; z-index: 1000; font-size: 14px;
        }
        .loading-spinner {
            border: 3px solid rgba(59,130,246,0.3); border-radius: 50%;
            border-top: 3px solid #3B82F6; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="max-w-lg mx-auto px-4 pt-6 pb-20">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">⚡ Admin Panel</h1>
                <p class="text-gray-400 text-xs">AREACUAN - Full Control (Tanpa Login)</p>
            </div>
            <button onclick="refreshData()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-sm">🔄 Refresh</button>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="glass-card stat-card p-4"><div class="text-gray-400 text-xs">👥 Total Users</div><div class="text-2xl font-bold font-mono text-white" id="totalUsers">0</div></div>
            <div class="glass-card stat-card p-4"><div class="text-gray-400 text-xs">💰 Total Saldo</div><div class="text-2xl font-bold font-mono text-white" id="totalBalance">Rp0</div></div>
            <div class="glass-card stat-card p-4"><div class="text-gray-400 text-xs">🔗 Total Referral</div><div class="text-2xl font-bold font-mono text-white" id="totalReferrals">0</div></div>
            <div class="glass-card stat-card p-4"><div class="text-gray-400 text-xs">⏳ Pending Withdraw</div><div class="text-2xl font-bold font-mono text-orange-500" id="pendingWithdraws">0</div></div>
        </div>

        <!-- Level Distribution -->
        <div class="glass-card p-5 mb-5">
            <div class="font-bold text-white mb-3">📊 Level Distribution</div>
            <div class="space-y-2">
                <div class="flex justify-between"><span>🟢 FREE</span><span id="freeCount" class="font-mono text-gray-300">0</span></div>
                <div class="flex justify-between"><span>🟣 PREMIUM</span><span id="premiumCount" class="font-mono text-purple-400">0</span></div>
                <div class="flex justify-between"><span>🟠 VIP</span><span id="vipCount" class="font-mono text-orange-400">0</span></div>
            </div>
        </div>

        <!-- Fraud Detection -->
        <div class="glass-card p-5 mb-5" style="border-left: 4px solid #EF4444;">
            <div class="font-bold text-red-400 mb-2">⚠️ Fraud Detection</div>
            <div id="fraudAlerts" class="text-xs text-gray-300 space-y-1">🔍 Scanning...</div>
        </div>

        <!-- Recent Activities -->
        <div class="glass-card p-5">
            <div class="font-bold text-white mb-3">🔄 Recent Activities</div>
            <div id="recentActivities" class="space-y-2 max-h-64 overflow-y-auto">Loading...</div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg><span>Dashboard</span></div>
        <div class="nav-item" onclick="location.href='users.html'"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" fill="none"/></svg><span>Users</span></div>
        <div class="nav-item" onclick="location.href='withdrawals.html'"><svg viewBox="0 0 24 24" width="24" height="24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M1 10h6a2 2 0 0 1 2 2 2 2 0 0 1-2 2H1" stroke="currentColor" stroke-width="1.8" fill="none"/></svg><span>Withdrawals</span></div>
        <div class="nav-item" onclick="location.href='settings.html'"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/></svg><span>Settings</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCf230zCliSZ9EYLByMnmflqw8sOz328Uc",
            authDomain: "database-cupz.firebaseapp.com",
            projectId: "database-cupz",
            storageBucket: "database-cupz.firebasestorage.app",
            messagingSenderId: "343357519412",
            appId: "1:343357519412:web:dce862636c7c459e6a3c61"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showToast(msg, isError = false) {
            let old = document.querySelector('.toast');
            if(old) old.remove();
            let div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            div.style.background = isError ? 'rgba(239,68,68,0.9)' : 'rgba(34,197,94,0.9)';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function refreshData() { showToast('🔄 Refreshing...'); loadAllData(); }

        async function loadAllData() {
            try {
                // Load users
                const usersSnap = await db.collection('users').get();
                let total = 0, totalBalance = 0, totalReferrals = 0;
                let free = 0, premium = 0, vip = 0;
                let fingerprints = {}, frauds = [];
                
                usersSnap.forEach(doc => {
                    const data = doc.data();
                    total++;
                    totalBalance += data.balance || 0;
                    totalReferrals += data.referralCount || 0;
                    if(data.level === 'FREE') free++;
                    else if(data.level === 'PREMIUM') premium++;
                    else if(data.level === 'VIP') vip++;
                    
                    const fp = data.fingerprint;
                    if(fp && fingerprints[fp]) frauds.push(`⚠️ Duplicate: ${data.email} & ${fingerprints[fp]}`);
                    else if(fp) fingerprints[fp] = data.email;
                });
                
                document.getElementById('totalUsers').innerText = total;
                document.getElementById('totalBalance').innerHTML = `Rp${totalBalance.toLocaleString('id')}`;
                document.getElementById('totalReferrals').innerText = totalReferrals;
                document.getElementById('freeCount').innerText = free;
                document.getElementById('premiumCount').innerText = premium;
                document.getElementById('vipCount').innerText = vip;
                
                const fraudHtml = frauds.length ? frauds.map(f => `<div class="text-red-400">${f}</div>`).join('') : '<div class="text-green-400">✅ Tidak ada kecurangan</div>';
                document.getElementById('fraudAlerts').innerHTML = fraudHtml;
                
                // Pending withdrawals
                const wdSnap = await db.collection('withdrawals').where('status', '==', 'pending').get();
                document.getElementById('pendingWithdraws').innerText = wdSnap.size;
                
                // Recent activities
                await loadRecentActivities();
                
            } catch(e) {
                console.error(e);
                document.getElementById('recentActivities').innerHTML = '<div class="text-red-400">❌ Gagal load data. Cek Firestore rules!</div>';
                showToast('Error: ' + e.message, true);
            }
        }
        
        async function loadRecentActivities() {
            let activities = [];
            const usersSnap = await db.collection('users').orderBy('createdAt', 'desc').limit(5).get();
            usersSnap.forEach(doc => {
                const data = doc.data();
                const date = data.createdAt?.toDate().toLocaleString('id') || 'Baru';
                activities.push(`📝 Register: ${data.email} - ${date}`);
            });
            
            const wdSnap = await db.collection('withdrawals').orderBy('createdAt', 'desc').limit(5).get();
            wdSnap.forEach(doc => {
                const wd = doc.data();
                const date = wd.createdAt?.toDate().toLocaleString('id') || 'Baru';
                activities.push(`💰 Withdraw: Rp${wd.amount?.toLocaleString('id')} (${wd.status}) - ${date}`);
            });
            
            const html = activities.length ? activities.map(a => `<div class="text-xs text-gray-300 border-b border-gray-700 pb-2">${a}</div>`).join('') : '<div class="text-gray-500">No activities</div>';
            document.getElementById('recentActivities').innerHTML = html;
        }
        
        loadAllData();
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
