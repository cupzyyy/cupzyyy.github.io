<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AREACUAN Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Space Mono', monospace; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        .glass-card {
            background: rgba(30,41,59,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px 20px;
            display: flex;
            justify-content: space-around;
            max-width: 512px;
            margin: 0 auto;
            width: 100%;
            z-index: 50;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item.active { color: #3B82F6; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .alert-card { background: rgba(239,68,68,0.1); border-left: 4px solid #EF4444; }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 20px;
            border-radius: 100px;
            z-index: 1000;
            font-size: 14px;
        }
        .loading-spinner {
            border: 3px solid rgba(59,130,246,0.3);
            border-radius: 50%;
            border-top: 3px solid #3B82F6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="max-w-lg mx-auto px-4 pt-6 pb-20">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">⚡ Admin Panel</h1>
                <p class="text-gray-400 text-xs">AREACUAN - Full Control</p>
            </div>
            <div class="flex gap-2">
                <button onclick="refreshData()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-sm">🔄 Refresh</button>
                <button onclick="exportData()" class="bg-green-600 text-white px-3 py-2 rounded-xl text-sm">📥 Export</button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="glass-card stat-card p-4">
                <div class="text-gray-400 text-xs">👥 Total Users</div>
                <div class="text-2xl font-bold font-mono text-white" id="totalUsers">0</div>
            </div>
            <div class="glass-card stat-card p-4">
                <div class="text-gray-400 text-xs">💰 Total Saldo</div>
                <div class="text-2xl font-bold font-mono text-white" id="totalBalance">Rp0</div>
            </div>
            <div class="glass-card stat-card p-4">
                <div class="text-gray-400 text-xs">🔗 Total Referral</div>
                <div class="text-2xl font-bold font-mono text-white" id="totalReferrals">0</div>
            </div>
            <div class="glass-card stat-card p-4">
                <div class="text-gray-400 text-xs">⏳ Pending Withdraw</div>
                <div class="text-2xl font-bold font-mono text-orange-500" id="pendingWithdraws">0</div>
            </div>
        </div>

        <!-- Level Distribution -->
        <div class="glass-card p-5 mb-5">
            <div class="font-bold text-white mb-3">📊 Level Distribution</div>
            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span>🟢 FREE</span>
                    <span id="freeCount" class="font-mono text-gray-300">0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>🟣 PREMIUM</span>
                    <span id="premiumCount" class="font-mono text-purple-400">0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>🟠 VIP</span>
                    <span id="vipCount" class="font-mono text-orange-400">0</span>
                </div>
            </div>
        </div>

        <!-- Fraud Detection Alert -->
        <div class="glass-card alert-card p-5 mb-5">
            <div class="font-bold text-red-400 mb-2 flex items-center gap-2">
                <span>⚠️</span> Fraud Detection
                <span id="fraudBadge" class="text-xs bg-red-600 px-2 py-0.5 rounded-full ml-auto">Real-time</span>
            </div>
            <div id="fraudAlerts" class="text-xs text-gray-300 space-y-1">
                <div class="text-gray-500">🔍 Scanning...</div>
            </div>
        </div>

        <!-- Recent Activities -->
        <div class="glass-card p-5">
            <div class="font-bold text-white mb-3 flex items-center gap-2">
                <span>🔄</span> Recent Activities
                <span class="text-xs text-gray-500 ml-auto">Live</span>
            </div>
            <div id="recentActivities" class="space-y-2 max-h-64 overflow-y-auto">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='dashboard.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='users.html'">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Users</span>
        </div>
        <div class="nav-item" onclick="window.location.href='withdrawals.html'">
            <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><path d="M1 10h6a2 2 0 0 1 2 2 2 2 0 0 1-2 2H1"/></svg>
            <span>Withdrawals</span>
        </div>
        <div class="nav-item" onclick="window.location.href='settings.html'">
            <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Settings</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCf230zCliSZ9EYLByMnmflqw8sOz328Uc",
            authDomain: "database-cupz.firebaseapp.com",
            projectId: "database-cupz",
            storageBucket: "database-cupz.firebasestorage.app",
            messagingSenderId: "343357519412",
            appId: "1:343357519412:web:dce862636c7c459e6a3c61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let unsubscribeUsers = null;
        let unsubscribeWithdraws = null;
        
        function showToast(msg, isError = false) {
            let old = document.querySelector('.toast');
            if(old) old.remove();
            let div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            div.style.background = isError ? 'rgba(239,68,68,0.9)' : 'rgba(34,197,94,0.9)';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        function refreshData() {
            showToast('🔄 Refreshing data...');
            // Unsubscribe dulu
            if(unsubscribeUsers) unsubscribeUsers();
            if(unsubscribeWithdraws) unsubscribeWithdraws();
            // Re-init listeners
            initRealtimeListeners();
        }
        
        function exportData() {
            let data = {
                users: [],
                withdrawals: [],
                exportTime: new Date().toISOString()
            };
            
            db.collection('users').get().then((snap) => {
                snap.forEach(doc => {
                    data.users.push({ id: doc.id, ...doc.data() });
                });
                db.collection('withdrawals').get().then((wdSnap) => {
                    wdSnap.forEach(doc => {
                        data.withdrawals.push({ id: doc.id, ...doc.data() });
                    });
                    let blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    let url = URL.createObjectURL(blob);
                    let a = document.createElement('a');
                    a.href = url;
                    a.download = `areacuan_export_${Date.now()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('✅ Export berhasil!');
                });
            });
        }
        
        function initRealtimeListeners() {
            // Real-time users stats
            unsubscribeUsers = db.collection('users').onSnapshot((snap) => {
                let total = 0;
                let totalBalance = 0;
                let totalReferrals = 0;
                let free = 0, premium = 0, vip = 0;
                let fingerprints = {};
                let frauds = [];
                
                snap.forEach(doc => {
                    let data = doc.data();
                    total++;
                    totalBalance += data.balance || 0;
                    totalReferrals += data.referralCount || 0;
                    
                    if(data.level === 'FREE') free++;
                    else if(data.level === 'PREMIUM') premium++;
                    else if(data.level === 'VIP') vip++;
                    
                    // Fraud detection: duplicate fingerprints
                    let fp = data.fingerprint;
                    if(fp && fingerprints[fp]) {
                        frauds.push(`⚠️ Duplicate device: ${data.email} & ${fingerprints[fp]}`);
                    } else if(fp) {
                        fingerprints[fp] = data.email;
                    }
                });
                
                document.getElementById('totalUsers').innerText = total;
                document.getElementById('totalBalance').innerHTML = `Rp${totalBalance.toLocaleString('id')}`;
                document.getElementById('totalReferrals').innerText = totalReferrals;
                document.getElementById('freeCount').innerText = free;
                document.getElementById('premiumCount').innerText = premium;
                document.getElementById('vipCount').innerText = vip;
                
                if(frauds.length > 0) {
                    document.getElementById('fraudAlerts').innerHTML = frauds.slice(0,5).map(f => `<div class="text-red-400">${f}</div>`).join('');
                    document.getElementById('fraudBadge').innerHTML = `${frauds.length} Alert`;
                    document.getElementById('fraudBadge').classList.add('bg-red-600', 'animate-pulse');
                } else {
                    document.getElementById('fraudAlerts').innerHTML = '<div class="text-green-400">✅ Tidak terdeteksi kecurangan</div>';
                    document.getElementById('fraudBadge').innerHTML = 'Clean';
                    document.getElementById('fraudBadge').classList.remove('bg-red-600', 'animate-pulse');
                    document.getElementById('fraudBadge').classList.add('bg-green-600');
                }
            }, (error) => {
                console.error('Users listener error:', error);
                showToast('Error loading users data', true);
            });
            
            // Real-time pending withdrawals
            unsubscribeWithdraws = db.collection('withdrawals').where('status', '==', 'pending').onSnapshot((snap) => {
                document.getElementById('pendingWithdraws').innerText = snap.size;
            });
            
            // Recent activities (manual fetch every 10 seconds)
            loadRecentActivities();
            setInterval(loadRecentActivities, 10000);
        }
        
        async function loadRecentActivities() {
            try {
                let activities = [];
                
                // Get recent registrations
                let usersSnap = await db.collection('users').orderBy('createdAt', 'desc').limit(5).get();
                usersSnap.forEach(doc => {
                    let data = doc.data();
                    let date = data.createdAt?.toDate().toLocaleString('id') || 'Baru';
                    activities.push(`📝 <span class="text-green-400">Register</span>: ${data.email} - ${date}`);
                });
                
                // Get recent withdrawals
                let wdSnap = await db.collection('withdrawals').orderBy('createdAt', 'desc').limit(5).get();
                wdSnap.forEach(doc => {
                    let wd = doc.data();
                    let date = wd.createdAt?.toDate().toLocaleString('id') || 'Baru';
                    let statusColor = wd.status === 'pending' ? 'text-yellow-400' : (wd.status === 'success' ? 'text-green-400' : 'text-red-400');
                    activities.push(`💰 <span class="text-blue-400">Withdraw</span>: Rp${wd.amount?.toLocaleString('id')} - <span class="${statusColor}">${wd.status}</span> - ${date}`);
                });
                
                let html = activities.slice(0,10).map(a => `<div class="text-xs text-gray-300 border-b border-gray-700 pb-2">${a}</div>`).join('');
                if(!html) html = '<div class="text-gray-500 text-center">No activities yet</div>';
                document.getElementById('recentActivities').innerHTML = html;
            } catch(e) {
                console.error('Activities error:', e);
            }
        }
        
        // Start everything
        initRealtimeListeners();
        
        // Simple auth check: just show warning if not logged in as admin (but still accessible)
        firebase.auth().onAuthStateChanged((user) => {
            if(!user) {
                let warning = document.createElement('div');
                warning.className = 'fixed top-0 left-0 right-0 bg-yellow-600 text-white text-center py-2 text-sm z-50';
                warning.innerHTML = '⚠️ Anda belum login sebagai admin. Beberapa fitur mungkin terbatas. <a href="#" onclick="firebase.auth().signOut(); window.location.reload()" class="underline">Login Admin</a>';
                document.body.insertBefore(warning, document.body.firstChild);
            }
        });
    </script>
</body>
</html>
